name: Live AI visibility

on:
  schedule:
    - cron: '17 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-ai-visibility
  cancel-in-progress: false

jobs:
  public-crawler-and-discovery-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP for exact response-header validation
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Verify public AI visibility paths
        shell: bash
        env:
          AI_VISIBILITY_BASE_URL: https://envitechal.com
        run: bash scripts/check-ai-visibility-live.sh
