name: Theme quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  php-and-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint child-theme PHP
        shell: bash
        run: |
          set -euo pipefail
          find wp-content/themes/generatepress-envitechal -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l

      - name: Test legacy chatbot response filter
        shell: bash
        run: php tests/ai-visibility-filter-test.php

      - name: Test legacy redirect map
        shell: bash
        run: |
          php tests/legacy-redirect-map-test.php
          php tests/internal-link-canonicalization-test.php
          php tests/robots-directives-test.php
          php tests/discovery-cache-remediation-test.php
          python3 tests/live-monitor-redirect-coverage-test.py
          python3 tests/live-monitor-ai-discovery-contract-test.py
          python3 tests/internal-link-pathways-contract-test.py

      - name: Guard against known production regressions
        shell: bash
        run: |
          set -euo pipefail
          theme='wp-content/themes/generatepress-envitechal'

          if grep -R -n -E 'eta_modern_render_analytical_lab_service_content|data-chatbot-id|assistant is taking longer than expected|company/envi-tech-al|#localbusiness|eta-modern-inline-css' "$theme"; then
            echo 'A known production regression was found.' >&2
            exit 1
          fi

          if grep -R -n -E 'API_KEY[[:space:]]*:|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|DB_PASSWORD|SECURE_AUTH_KEY' "$theme"; then
            echo 'A possible secret was found in the public theme.' >&2
            exit 1
          fi

      - name: Verify AI discovery artifacts
        shell: bash
        run: |
          set -euo pipefail
          theme='wp-content/themes/generatepress-envitechal'
          ai_visibility="$theme/inc/ai-visibility.php"
          test -s deploy/public_html/llms.txt
          test -s deploy/public_html/llms-full.txt
          grep -q 'inc/ai-visibility.php' wp-content/themes/generatepress-envitechal/functions.php
          grep -q 'PNAC LAB-347' deploy/public_html/llms.txt
          grep -q "'/llms.txt'" "$ai_visibility"
          grep -q "'/llms-full.txt'" "$ai_visibility"
          grep -q "ob_start('eta_ai_visibility_filter_legacy_chatbot_response')" "$ai_visibility"
          grep -q 'eta-home-hero-1500.webp' wp-content/themes/generatepress-envitechal/front-page.php
          grep -q 'imagesizes="100vw"' wp-content/themes/generatepress-envitechal/functions.php
          python3 tests/home-hero-contract-test.py
          grep -q "rank_math/sitemap/enable_caching" wp-content/themes/generatepress-envitechal/inc/legacy-redirects.php
          robots_directives="$theme/inc/robots-directives.php"
          grep -q 'inc/robots-directives.php' "$theme/functions.php"
          grep -Fq "add_action('init', 'eta_modern_maybe_redirect_legacy_request', -9999)" "$theme/inc/legacy-redirects.php"
          grep -Fq "add_filter('rank_math/frontend/robots', 'eta_modern_filter_rank_math_staging_robots', 99, 1)" "$robots_directives"
          grep -Fq "add_filter('wp_robots', 'eta_modern_filter_wordpress_staging_robots', 99, 1)" "$robots_directives"
          grep -Fq "'Cache-Control' => 'public, max-age=300, s-maxage=3600, must-revalidate'" "$robots_directives"
          grep -Fq 'User-agent: OAI-SearchBot' deploy/public_html/robots.txt
          grep -Fq 'User-agent: GPTBot' deploy/public_html/robots.txt
          grep -Fq "'X-LiteSpeed-Cache-Control' => 'no-cache'" "$robots_directives"
          if grep -q 'script_loader_tag' "$ai_visibility"; then
            echo 'The raw legacy snippet must be filtered from the final HTML response.' >&2
            exit 1
          fi
          grep -Fq "header('Vary: Accept', false);" "$ai_visibility"
          grep -Fq "header('Cache-Control: private, no-store, no-cache, must-revalidate', true);" "$ai_visibility"
          grep -Fq "'X-ETA-Markdown-Source' => '1'" "$ai_visibility"

      - name: Validate staging deployment scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/deploy-staging-theme.sh
          bash -n scripts/rollback-staging-theme.sh
          bash -n scripts/check-ai-visibility-live.sh
          bash -n scripts/remediate-discovery-cache-headers.sh
          bash -n scripts/rollback-discovery-cache-headers.sh
          bash -n scripts/prepare-staging-ai-page-parity.sh
          python3 tests/staging-page-parity-script-test.py
          python3 tests/discovery-cache-remediation-script-test.py
          grep -Eq '^VALIDATED_PR_COMMIT="[0-9a-f]{40}"$' scripts/deploy-staging-theme.sh
          grep -q 'archive --format=tar "$VALIDATED_PR_COMMIT"' scripts/deploy-staging-theme.sh
          # Staging may lead production while a newly reviewed candidate is being validated.
          # Production remains blocked by its separate pin and staging-tree digest gate.
          grep -Fq 'git -C "$REPO" diff --quiet "$VALIDATED_PRODUCTION_COMMIT" HEAD --' scripts/deploy-production.sh
          grep -Fq 'the deployed staging theme is not the exact pinned production candidate' scripts/deploy-production.sh
          grep -q 'SWAP_STATE="new-active"' scripts/deploy-staging-theme.sh
          grep -q 'TARGET_REAL' scripts/deploy-staging-theme.sh
          grep -Fq 'find "$NEW_THEME" -type d -exec chmod 0755 {} +' scripts/deploy-staging-theme.sh
          grep -Fq 'find "$NEW_THEME" -type f -exec chmod 0644 {} +' scripts/deploy-staging-theme.sh
          grep -Fq 'chmod 0600 "$BACKUP" "$BACKUP.sha256" "$BACKUP_DIR/LAST_STAGING_THEME_BACKUP"' scripts/deploy-staging-theme.sh
          grep -Fq 'WP_CLI="$(command -v wp || true)"' scripts/deploy-staging-theme.sh
          grep -Fq 'do_action("litespeed_purge_all")' scripts/deploy-staging-theme.sh
          grep -Fq 'WARNING: WP-CLI is unavailable' scripts/deploy-staging-theme.sh
          grep -Fq 'CONFIRM_STAGING_DISCOVERY_CACHE' scripts/remediate-discovery-cache-headers.sh
          grep -Fq 'CONFIRM_PRODUCTION_DISCOVERY_CACHE' scripts/remediate-discovery-cache-headers.sh
          grep -Fq 'CONFIRM_DISCOVERY_CACHE_ROLLBACK' scripts/rollback-discovery-cache-headers.sh
          grep -Fq 'SetEnvIf Request_URI' scripts/remediate-discovery-cache-headers.sh
          grep -Fq 'public, max-age=300, s-maxage=3600, must-revalidate' scripts/remediate-discovery-cache-headers.sh
          grep -Fq 'STAGING_HOST="staging.envitechal.com"' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'staging and production use the same database and table prefix' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'wordpress_database_identity' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq -- '--skip-plugins --skip-themes eval' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq '$wpdb->get_var("SELECT DATABASE()")' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'ETA_DB_IDENTITY:' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq "sed -nE 's/^ETA_DB_IDENTITY:([0-9a-f]{64})$/\\1/p'" scripts/prepare-staging-ai-page-parity.sh
          grep -Fq '[[ "$identity" =~ ^[0-9a-f]{64}$ ]]' scripts/prepare-staging-ai-page-parity.sh
          if grep -Fq '< <(' scripts/prepare-staging-ai-page-parity.sh; then
            echo 'The cPanel helper must not require /dev/fd process substitution.' >&2
            exit 1
          fi
          grep -Fq 'flock -n 9' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'post_status=auto-draft' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'post_type=attachment' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'post_status=inherit' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'post delete "$created_id" --force' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'post url-to-id' scripts/prepare-staging-ai-page-parity.sh
          grep -Fq 'find "$RESTORE_DIR" -type d -exec chmod 0755 {} +' scripts/rollback-staging-theme.sh
          grep -Fq 'find "$RESTORE_DIR" -type f -exec chmod 0644 {} +' scripts/rollback-staging-theme.sh
          grep -Fq 'chmod 0600 "$FAILED_ARCHIVE" "$FAILED_ARCHIVE.sha256"' scripts/rollback-staging-theme.sh
          if grep -R -n -E 'rsync|cp -a' scripts; then
            echo 'Staging deployment must use the pinned Git archive and atomic swap.' >&2
            exit 1
          fi

      - name: Validate production deployment transaction
        shell: bash
        run: |
          set -euo pipefail
          deploy='scripts/deploy-production.sh'
          rollback='scripts/rollback-production.sh'

          bash -n "$deploy"
          bash -n "$rollback"
          python3 tests/deployment-state-transition-test.py
          grep -Eq '^VALIDATED_PRODUCTION_COMMIT="[0-9a-f]{40}"$' "$deploy"
          grep -Fq 'CONFIRM_PRODUCTION_DEPLOY' "$deploy"
          grep -Fq 'CONFIRM_PRODUCTION_ROLLBACK' "$rollback"
          grep -Fq 'DomainInfo single_domain_data domain="$domain"' "$deploy"
          grep -Fq 'DomainInfo single_domain_data domain="$domain"' "$rollback"
          grep -Fq 'git -C "$REPO" archive --format=tar "$VALIDATED_PRODUCTION_COMMIT"' "$deploy"
          grep -Fq '"$THEME_REL" "$ROBOTS_REL" "$LLMS_REL" "$LLMS_FULL_REL"' "$deploy"
          grep -Fq 'the deployed staging theme is not the exact pinned production candidate' "$deploy"
          grep -Fq '[[ "$(tree_digest "$STAGING_TARGET")" == "$PREPARED_THEME_DIGEST" ]]' "$deploy"
          grep -Fq 'find "$NEW_THEME" -type d -exec chmod 0755 {} +' "$deploy"
          grep -Fq 'find "$NEW_THEME" -type f -exec chmod 0644 {} +' "$deploy"
          grep -Fq 'install -m 0644 -- "${ARCHIVE_ROOT}/${ROBOTS_REL}" "$NEW_ROBOTS"' "$deploy"
          grep -Fq 'install -m 0644 -- "${ARCHIVE_ROOT}/${LLMS_REL}" "$NEW_LLMS"' "$deploy"
          grep -Fq 'LAST_PRODUCTION_BACKUP' "$deploy"
          grep -Fq 'sha256sum -c MANIFEST.sha256' "$deploy"
          grep -Fq 'sha256sum -c MANIFEST.sha256' "$rollback"
          grep -Fq 'LLMS_DESIRED_STATE" == "present"' "$rollback"
          grep -Fq 'do_action("litespeed_purge_all")' "$deploy"
          grep -Fq 'do_action("litespeed_purge_all")' "$rollback"
          grep -Fq 'has_action("litespeed_purge_all")' "$deploy"
          grep -Fq 'has_action("litespeed_purge_all")' "$rollback"
          grep -Fq 'EXTERNAL EDGE/WAF ACTION STILL REQUIRED' "$deploy"
          grep -Fq 'EXTERNAL EDGE/WAF ACTION STILL REQUIRED' "$rollback"

          if grep -R -n -E 'rsync|cp -a' scripts; then
            echo 'Deployments must use pinned archives and atomic renames, never in-place copies.' >&2
            exit 1
          fi
